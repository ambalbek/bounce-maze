function mkEngine() {
  if (engine) { Events.off(engine); World.clear(world, false); Engine.clear(engine); }
  engine = Engine.create({ gravity: { x: 0, y: 1, scale: 0.0014 } });
  world  = engine.world;
}

function calcStars(shotsUsed, maxShots) {
  const pct = shotsUsed / maxShots;
  if (pct <= 0.34) return 3;
  if (pct <= 0.67) return 2;
  return 1;
}

// ── Daily Challenge ────────────────────────────────────────
function getDailyInfo() {
  const now   = new Date();
  const y     = now.getFullYear(), mo = now.getMonth() + 1, d = now.getDate();
  const seed  = y * 10000 + mo * 100 + d;
  const lvl   = seed % (LEVELS.length - 1) + 1;
  const dateStr = `${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const done  = localStorage.getItem('bm_daily_date') === dateStr;
  const score = parseInt(localStorage.getItem('bm_daily_score') || '0');
  return { lvl, dateStr, done, score };
}

function saveDailyComplete(score) {
  const { dateStr } = getDailyInfo();
  localStorage.setItem('bm_daily_date', dateStr);
  localStorage.setItem('bm_daily_score', score);
}

// ── Load Level ─────────────────────────────────────────────
function loadLevel(idx, isDaily) {
  isDaily = !!isDaily;
  isDailyChallenge = isDaily;
  lvlIdx = idx;
  mkEngine();

  wallBodies     = [];
  movingWallDefs = [];
  bumperBodies   = [];
  portalPairs    = [];
  goalSensorBody = null;
  ballBody       = null;
  particles      = [];
  floatTexts     = [];
  trail          = [];
  shots          = 0;
  stopTmr        = 0;
  bounceCount    = 0;
  comboMult      = 1;
  currentRunRecord = [];
  ghostIdx       = 0;
  levelScore     = 0;

  // Load ghost from localStorage
  const ghostKey = `bm_ghost_${idx}`;
  const ghostRaw = localStorage.getItem(ghostKey);
  ghostFrames = ghostRaw ? JSON.parse(ghostRaw) : [];

  const L = LEVELS[idx];
  ballStart = { x: L.ball[0], y: L.ball[1] };

  // Borders
  const borderDefs = [
    [GW/2, GH+10, GW, 20],
    [-10,  GH/2,  20, GH],
    [GW+10,GH/2,  20, GH],
    [GW/2, -10,   GW, 20]
  ];
  for (const [bx, by, bw, bh] of borderDefs) {
    const b = Bodies.rectangle(bx, by, bw, bh,
      { isStatic: true, restitution: 0.80, friction: 0.0, label: 'wall' });
    World.add(world, b);
    wallBodies.push({ body: b, isBorder: true, isMoving: false });
  }

  // Static walls
  for (const [wx, wy, ww, wh, wa = 0] of (L.walls || [])) {
    const b = Bodies.rectangle(wx, wy, ww, wh,
      { isStatic: true, restitution: 0.80, friction: 0.0, label: 'wall' });
    Body.setAngle(b, wa);
    World.add(world, b);
    wallBodies.push({ body: b, isBorder: false, isMoving: false });
  }

  // Moving walls
  for (const [cx, cy, ww, wh, wa, axis, range, speed] of (L.movingWalls || [])) {
    const b = Bodies.rectangle(cx, cy, ww, wh,
      { isStatic: true, restitution: 0.80, friction: 0.0, label: 'wall' });
    Body.setAngle(b, wa || 0);
    World.add(world, b);
    wallBodies.push({ body: b, isBorder: false, isMoving: true });
    movingWallDefs.push({ body: b, ox: cx, oy: cy, axis, range, speed, t: Math.random() * Math.PI * 2 });
  }

  // Bumpers
  for (const [bx, by, br] of (L.bumpers || [])) {
    const b = Bodies.circle(bx, by, br,
      { isStatic: true, restitution: 1.3, friction: 0.0, label: 'bumper' });
    World.add(world, b);
    bumperBodies.push({ body: b });
  }

  // Teleporters
  for (const [x1, y1, x2, y2, r] of (L.teleporters || [])) {
    const bA = Bodies.circle(x1, y1, r,
      { isStatic: true, isSensor: true, label: 'portalA' });
    const bB = Bodies.circle(x2, y2, r,
      { isStatic: true, isSensor: true, label: 'portalB' });
    World.add(world, bA);
    World.add(world, bB);
    portalPairs.push({ bodyA: bA, bodyB: bB, ox1: x1, oy1: y1, ox2: x2, oy2: y2, r, cooldown: 0 });
  }

  // Ball
  ballBody = Bodies.circle(L.ball[0], L.ball[1], BALL_R, {
    restitution: 0.80, friction: 0.0, frictionAir: 0.012,
    density: 0.003, label: 'ball', isStatic: true
  });
  World.add(world, ballBody);

  // Goal sensor
  goalSensorBody = Bodies.circle(L.goal[0], L.goal[1], L.goal[2] + 4, {
    isStatic: true, isSensor: true, label: 'goal'
  });
  World.add(world, goalSensorBody);

  // Collision handler
  Events.on(engine, 'collisionStart', evt => {
    for (const { bodyA, bodyB } of evt.pairs) {
      const la = bodyA.label, lb = bodyB.label;
      if (gs !== S.FLY) continue;

      // Win
      if ((la === 'ball' && lb === 'goal') || (la === 'goal' && lb === 'ball')) {
        win(); continue;
      }

      // Wall bounce
      if ((la === 'ball' && lb === 'wall') || (la === 'wall' && lb === 'ball')) {
        const pos = la === 'ball' ? bodyA.position : bodyB.position;
        bounceCount++;
        comboMult = 1 + bounceCount * 0.1;
        floatTexts.push({ x: pos.x, y: pos.y, text: `+x${comboMult.toFixed(1)}`, life: 1, col: '#ffd700' });
        burst(pos.x, pos.y, '#ff7043', 8);
      }

      // Bumper bounce
      if ((la === 'ball' && lb === 'bumper') || (la === 'bumper' && lb === 'ball')) {
        const pos = la === 'ball' ? bodyA.position : bodyB.position;
        bounceCount++;
        comboMult = 1 + bounceCount * 0.1;
        floatTexts.push({ x: pos.x, y: pos.y, text: `+x${comboMult.toFixed(1)}`, life: 1, col: '#a855f7' });
        burst(pos.x, pos.y, '#a855f7', 12);
      }

      // Portal teleport
      const isPortalA = la === 'portalA' || lb === 'portalA';
      const isPortalB = la === 'portalB' || lb === 'portalB';
      if ((la === 'ball' || lb === 'ball') && (isPortalA || isPortalB)) {
        for (const pp of portalPairs) {
          if (pp.cooldown > 0) continue;
          const hitA = (la === 'portalA' && bodyA === pp.bodyA) || (lb === 'portalA' && bodyB === pp.bodyA);
          const hitB = (la === 'portalB' && bodyA === pp.bodyB) || (lb === 'portalB' && bodyB === pp.bodyB);
          if (hitA) {
            Body.setPosition(ballBody, { x: pp.ox2, y: pp.oy2 });
            pp.cooldown = 40;
            burst(pp.ox2, pp.oy2, '#a855f7', 18);
            burst(pp.ox1, pp.oy1, '#60a5fa', 12);
          } else if (hitB) {
            Body.setPosition(ballBody, { x: pp.ox1, y: pp.oy1 });
            pp.cooldown = 40;
            burst(pp.ox1, pp.oy1, '#a855f7', 18);
            burst(pp.ox2, pp.oy2, '#60a5fa', 12);
          }
        }
      }
    }
  });

  gs = S.AIM;
}

// ── Shoot ──────────────────────────────────────────────────
function shoot(tx, ty) {
  if (gs !== S.AIM) return;
  const L = LEVELS[lvlIdx];
  if (shots >= L.shots) return;
  const dx = ballStart.x - tx, dy = ballStart.y - ty;
  const d  = Math.hypot(dx, dy);
  if (d < 10) return;

  const pwr = Math.min(d / 9, MAX_PWR);
  Body.setPosition(ballBody, { x: ballStart.x, y: ballStart.y });
  Body.setVelocity(ballBody,  { x: 0, y: 0 });
  Body.setStatic(ballBody, false);
  Body.setVelocity(ballBody,  { x: (dx / d) * pwr, y: (dy / d) * pwr });

  shots++;
  stopTmr     = 0;
  trail       = [];
  bounceCount = 0;
  comboMult   = 1;
  ghostIdx    = 0;
  currentRunRecord = [];
  gs = S.FLY;
}

// ── Win ────────────────────────────────────────────────────
function win() {
  if (gs === S.WIN) return;
  gs = S.WIN;
  burst(LEVELS[lvlIdx].goal[0], LEVELS[lvlIdx].goal[1], '#ffd700', 55);
  Body.setStatic(ballBody, true);

  levelStars = calcStars(shots, LEVELS[lvlIdx].shots);
  const base = LEVEL_BASE[lvlIdx];
  levelScore = Math.round(base * levelStars * comboMult * (isDailyChallenge ? 2 : 1));
  totalScore += levelScore;

  const prev = bestScores[lvlIdx] || 0;
  if (levelStars > prev) {
    bestScores[lvlIdx] = levelStars;
    localStorage.setItem('bm_best', JSON.stringify(bestScores));
  }
  if (totalScore > grandBest) {
    grandBest = totalScore;
    localStorage.setItem('bm_grand', grandBest);
  }

  // Save ghost (subsample every 2nd frame)
  if (currentRunRecord.length > 0) {
    const sub = currentRunRecord.filter((_, i) => i % 2 === 0);
    localStorage.setItem(`bm_ghost_${lvlIdx}`, JSON.stringify(sub));
  }

  if (isDailyChallenge) {
    saveDailyComplete(levelScore);
  }
}

// ── Stop check ─────────────────────────────────────────────
function checkStop() {
  if (gs !== S.FLY || !ballBody) return;
  const v   = ballBody.velocity;
  const spd = Math.hypot(v.x, v.y);
  const py  = ballBody.position.y;
  if (py > GH + 80 || spd < 0.18) {
    if (++stopTmr > 28) {
      Body.setStatic(ballBody, true);
      Body.setPosition(ballBody, { x: ballStart.x, y: ballStart.y });
      Body.setVelocity(ballBody,  { x: 0, y: 0 });
      stopTmr     = 0;
      bounceCount = 0;
      comboMult   = 1;
      gs = shots >= LEVELS[lvlIdx].shots ? S.FAIL : S.AIM;
    }
  } else { stopTmr = 0; }
}

// ── Moving walls update ────────────────────────────────────
function updateMovingWalls() {
  for (const mw of movingWallDefs) {
    mw.t += 0.02 * mw.speed;
    const offset = Math.sin(mw.t) * mw.range / 2;
    const nx = mw.axis === 'x' ? mw.ox + offset : mw.ox;
    const ny = mw.axis === 'y' ? mw.oy + offset : mw.oy;
    Body.setPosition(mw.body, { x: nx, y: ny });
  }
}

// ── Portal cooldowns ───────────────────────────────────────
function updatePortals() {
  for (const pp of portalPairs) {
    if (pp.cooldown > 0) pp.cooldown--;
  }
}

// ── Particles ──────────────────────────────────────────────
function burst(x, y, col, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = Math.random() * 5 + 1;
    particles.push({
      x, y, col,
      vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      r:  2 + Math.random() * 3,
      life: 1, dec: 0.022 + Math.random() * 0.02
    });
  }
}

function tickParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.vy += 0.13; p.vx *= 0.96;
    p.x += p.vx; p.y += p.vy;
    p.life -= p.dec;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = floatTexts.length - 1; i >= 0; i--) {
    const f = floatTexts[i];
    f.y -= 1.2;
    f.life -= 0.025;
    if (f.life <= 0) floatTexts.splice(i, 1);
  }
}

// ── Trajectory preview ─────────────────────────────────────
function trajectory(sx, sy, vx, vy) {
  const pts = [];
  const L = LEVELS[lvlIdx];
  let cx = sx, cy = sy, cvx = vx, cvy = vy, bounces = 0;

  for (let i = 0; i < 320; i++) {
    cvy += TRAJ_GR;
    cx += cvx; cy += cvy;

    if (cx < BALL_R)      { cx = BALL_R;      cvx =  Math.abs(cvx) * REST; bounces++; }
    if (cx > GW - BALL_R) { cx = GW - BALL_R; cvx = -Math.abs(cvx) * REST; bounces++; }
    if (cy < BALL_R)      { cy = BALL_R;       cvy =  Math.abs(cvy) * REST; bounces++; }
    if (cy > GH + 60) break;

    // Axis-aligned static walls only
    for (const [wx, wy, ww, wh, wa = 0] of (L.walls || [])) {
      if (Math.abs(wa) > 0.05) continue;
      const l = wx - ww / 2 - BALL_R, r = wx + ww / 2 + BALL_R;
      const t = wy - wh / 2 - BALL_R, b = wy + wh / 2 + BALL_R;
      if (cx > l && cx < r && cy > t && cy < b) {
        const px = cx - cvx, py = cy - cvy;
        if (px <= l || px >= r) { cvx *= -REST; cx = cvx > 0 ? r + 1 : l - 1; }
        else                    { cvy *= -REST; cy = cvy > 0 ? b + 1 : t - 1; }
        bounces++;
      }
    }

    if (i % 3 === 0) pts.push({ x: cx, y: cy });
    if (bounces > 8) break;
  }
  return pts;
}

// ── Draw helpers ───────────────────────────────────────────
function roundRect(x, y, w, h, r) {
  ct.beginPath();
  ct.moveTo(x + r, y);
  ct.arcTo(x + w, y,     x + w, y + h, r);
  ct.arcTo(x + w, y + h, x,     y + h, r);
  ct.arcTo(x,     y + h, x,     y,     r);
  ct.arcTo(x,     y,     x + w, y,     r);
  ct.closePath();
}

function drawBG() {
  ct.fillStyle = '#080818';
  ct.fillRect(0, 0, GW, GH);
  ct.fillStyle = 'rgba(255,255,255,0.022)';
  for (let x = 25; x < GW; x += 30) {
    for (let y = 25; y < GH; y += 30) {
      ct.beginPath(); ct.arc(x, y, 1, 0, Math.PI * 2); ct.fill();
    }
  }
}

// ── Draw: static walls ─────────────────────────────────────
function drawWalls() {
  for (const { body, isBorder, isMoving } of wallBodies) {
    if (isBorder) continue;
    const v = body.vertices;
    ct.save();
    if (isMoving) {
      ct.shadowColor = '#f59e0b';
      ct.shadowBlur  = 14;
      const g = ct.createLinearGradient(v[0].x, v[0].y, v[2].x, v[2].y);
      g.addColorStop(0, '#f59e0b');
      g.addColorStop(1, '#b45309');
      ct.fillStyle = g;
    } else {
      ct.shadowColor = '#4ecdc4';
      ct.shadowBlur  = 14;
      const g = ct.createLinearGradient(v[0].x, v[0].y, v[2].x, v[2].y);
      g.addColorStop(0, '#4ecdc4');
      g.addColorStop(1, '#1b8c84');
      ct.fillStyle = g;
    }
    ct.beginPath();
    ct.moveTo(v[0].x, v[0].y);
    for (let i = 1; i < v.length; i++) ct.lineTo(v[i].x, v[i].y);
    ct.closePath();
    ct.fill();
    ct.shadowBlur = 0;
    ct.restore();
  }
}

// ── Draw: bumpers ──────────────────────────────────────────
function drawBumpers() {
  const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 300);
  for (const { body } of bumperBodies) {
    const { x, y } = body.position;
    const r = body.circleRadius;

    const glow = ct.createRadialGradient(x, y, 0, x, y, r * 2.5);
    glow.addColorStop(0, `rgba(168,85,247,${0.35 * pulse})`);
    glow.addColorStop(1, 'rgba(168,85,247,0)');
    ct.fillStyle = glow;
    ct.beginPath(); ct.arc(x, y, r * 2.5, 0, Math.PI * 2); ct.fill();

    ct.save();
    ct.shadowColor = '#a855f7';
    ct.shadowBlur  = 18 + 8 * pulse;
    const ig = ct.createRadialGradient(x - r * 0.3, y - r * 0.3, 1, x, y, r);
    ig.addColorStop(0, '#d8b4fe');
    ig.addColorStop(0.6, '#a855f7');
    ig.addColorStop(1,   '#7e22ce');
    ct.fillStyle = ig;
    ct.beginPath(); ct.arc(x, y, r, 0, Math.PI * 2); ct.fill();
    ct.shadowBlur = 0;
    ct.restore();
  }
}

// ── Draw: portals ──────────────────────────────────────────
function drawPortals() {
  const t = Date.now() / 1000;
  for (const pp of portalPairs) {
    const { ox1, oy1, ox2, oy2, r } = pp;

    // Dashed connecting line
    ct.save();
    ct.setLineDash([5, 7]);
    ct.strokeStyle = 'rgba(150,120,255,0.3)';
    ct.lineWidth   = 1.5;
    ct.beginPath();
    ct.moveTo(ox1, oy1);
    ct.lineTo(ox2, oy2);
    ct.stroke();
    ct.setLineDash([]);
    ct.restore();

    // Portal A – purple
    drawSinglePortal(ox1, oy1, r, 280, t);
    // Portal B – blue
    drawSinglePortal(ox2, oy2, r, 200, t);
  }
}

function drawSinglePortal(x, y, r, hue, t) {
  const pulse = 0.5 + 0.5 * Math.sin(t * 2.5);

  const glow = ct.createRadialGradient(x, y, 0, x, y, r * 2.8);
  glow.addColorStop(0, `hsla(${hue},80%,60%,${0.3 * pulse})`);
  glow.addColorStop(1, `hsla(${hue},80%,60%,0)`);
  ct.fillStyle = glow;
  ct.beginPath(); ct.arc(x, y, r * 2.8, 0, Math.PI * 2); ct.fill();

  // Inner glow
  const ig = ct.createRadialGradient(x, y, 0, x, y, r);
  ig.addColorStop(0,   `hsla(${hue},90%,85%,0.5)`);
  ig.addColorStop(0.6, `hsla(${hue},80%,60%,0.3)`);
  ig.addColorStop(1,   `hsla(${hue},80%,50%,0)`);
  ct.fillStyle = ig;
  ct.beginPath(); ct.arc(x, y, r, 0, Math.PI * 2); ct.fill();

  // Animated ring
  ct.save();
  ct.shadowColor = `hsl(${hue},80%,60%)`;
  ct.shadowBlur  = 10 + 8 * pulse;
  ct.strokeStyle = `hsl(${hue},80%,65%)`;
  ct.lineWidth   = 2.5;
  ct.beginPath(); ct.arc(x, y, r + 2 * Math.sin(t * 3), 0, Math.PI * 2); ct.stroke();
  ct.strokeStyle = `hsla(${hue},80%,80%,0.5)`;
  ct.lineWidth   = 1;
  ct.beginPath(); ct.arc(x, y, r * 0.6, 0, Math.PI * 2); ct.stroke();
  ct.shadowBlur  = 0;
  ct.restore();
}

// ── Draw: goal ─────────────────────────────────────────────
function drawGoal() {
  const [gx, gy, gr] = LEVELS[lvlIdx].goal;
  const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 420);

  const pg = ct.createRadialGradient(gx, gy, 0, gx, gy, gr * 3.2);
  pg.addColorStop(0, `rgba(255,215,0,${0.28 * pulse})`);
  pg.addColorStop(1, 'rgba(255,215,0,0)');
  ct.fillStyle = pg;
  ct.beginPath(); ct.arc(gx, gy, gr * 3.2, 0, Math.PI * 2); ct.fill();

  ct.shadowColor = '#ffd700'; ct.shadowBlur = 20;
  ct.strokeStyle = '#ffd700'; ct.lineWidth = 2.5;
  ct.fillStyle   = 'rgba(255,215,0,0.10)';
  ct.beginPath(); ct.arc(gx, gy, gr, 0, Math.PI * 2);
  ct.fill(); ct.stroke();
  ct.shadowBlur = 0;

  ct.fillStyle   = '#ffd700';
  ct.font        = `${Math.round(gr * 1.15)}px serif`;
  ct.textAlign   = 'center';
  ct.textBaseline = 'middle';
  ct.fillText('\u2605', gx, gy);
}

// ── Draw: trail ────────────────────────────────────────────
function drawTrail() {
  for (let i = 1; i < trail.length; i++) {
    const a = (i / trail.length) * 0.45;
    ct.strokeStyle = `rgba(255,107,53,${a})`;
    ct.lineWidth   = 2;
    ct.beginPath();
    ct.moveTo(trail[i - 1].x, trail[i - 1].y);
    ct.lineTo(trail[i].x,     trail[i].y);
    ct.stroke();
  }
}

// ── Draw: ghost ball ───────────────────────────────────────
function drawGhost() {
  if (ghostFrames.length === 0) return;
  if (ghostIdx >= ghostFrames.length) return;
  const gp = ghostFrames[ghostIdx];
  if (!gp) return;
  ct.save();
  ct.globalAlpha  = 0.25;
  ct.fillStyle    = '#60a5fa';
  ct.shadowColor  = '#60a5fa';
  ct.shadowBlur   = 10;
  ct.beginPath(); ct.arc(gp[0], gp[1], BALL_R, 0, Math.PI * 2); ct.fill();
  ct.restore();
  ct.shadowBlur = 0;
}

// ── Draw: ball ─────────────────────────────────────────────
function drawBall() {
  if (!ballBody) return;
  const { x, y } = ballBody.position;

  if (gs === S.AIM && !dragging) {
    const pulse = 0.4 + 0.4 * Math.sin(Date.now() / 300);
    const ringR = BALL_R + 10 + 6 * Math.sin(Date.now() / 400);
    ct.strokeStyle = `rgba(255,107,53,${pulse})`;
    ct.lineWidth   = 2;
    ct.beginPath(); ct.arc(x, y, ringR, 0, Math.PI * 2); ct.stroke();
  }

  ct.shadowColor = '#ff6b35'; ct.shadowBlur = 20;
  const g = ct.createRadialGradient(x - 3, y - 3, 1, x, y, BALL_R);
  g.addColorStop(0,   '#ffaa88');
  g.addColorStop(0.5, '#ff6b35');
  g.addColorStop(1,   '#c84400');
  ct.fillStyle = g;
  ct.beginPath(); ct.arc(x, y, BALL_R, 0, Math.PI * 2); ct.fill();
  ct.shadowBlur = 0;
}

// ── Draw: aim ──────────────────────────────────────────────
function drawAim() {
  if (!dragging || gs !== S.AIM) return;
  const dx = ballStart.x - mx, dy = ballStart.y - my;
  const d  = Math.hypot(dx, dy);
  if (d < 10) return;

  const pwr = Math.min(d / 9, MAX_PWR);
  const pts = trajectory(ballStart.x, ballStart.y, (dx / d) * pwr, (dy / d) * pwr);

  for (let i = 0; i < pts.length; i++) {
    const a = (1 - i / pts.length) * 0.85;
    const r = 3 * (1 - i / pts.length) + 1;
    ct.fillStyle = `rgba(255,107,53,${a})`;
    ct.beginPath(); ct.arc(pts[i].x, pts[i].y, r, 0, Math.PI * 2); ct.fill();
  }

  const pct = pwr / MAX_PWR;
  const bw = 80, bh = 7, bx = ballStart.x - bw / 2, by = ballStart.y + 24;
  ct.fillStyle = 'rgba(0,0,0,0.5)';
  roundRect(bx, by, bw, bh, 4); ct.fill();
  ct.fillStyle = pct < 0.4 ? '#4ecdc4' : pct < 0.75 ? '#ffd700' : '#ff4444';
  roundRect(bx, by, bw * pct, bh, 4); ct.fill();
}

// ── Draw: particles ────────────────────────────────────────
function drawParticles() {
  ct.save();
  for (const p of particles) {
    ct.globalAlpha = p.life;
    ct.fillStyle   = p.col;
    ct.shadowColor = p.col;
    ct.shadowBlur  = 8;
    ct.beginPath(); ct.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2); ct.fill();
  }
  ct.restore();
  ct.shadowBlur = 0;
}

// ── Draw: float texts ──────────────────────────────────────
function drawFloatTexts() {
  ct.save();
  for (const f of floatTexts) {
    ct.globalAlpha = f.life;
    ct.fillStyle   = f.col;
    ct.font        = 'bold 13px system-ui';
    ct.textAlign   = 'center';
    ct.textBaseline = 'middle';
    ct.fillText(f.text, f.x, f.y);
  }
  ct.restore();
}

function drawHUD() {

  // Score panel – top center
  ct.fillStyle = 'rgba(0,0,0,0.60)';
  roundRect(GW / 2 - 55, 10, 110, 54, 10); ct.fill();

  ct.font        = 'bold 20px system-ui';
  ct.textAlign   = 'center';
  ct.textBaseline = 'top';
  ct.fillText(totalScore.toLocaleString(), GW / 2, 16);
  ct.fillStyle   = '#555';
  ct.font        = '10px system-ui';
  ct.fillText(`BEST ${grandBest.toLocaleString()}`, GW / 2, 40);

  // Shot dots – top right
  const shotsLeft = L.shots - shots;
  ct.fillStyle = 'rgba(0,0,0,0.60)';
  roundRect(GW - 118, 10, 108, 54, 10); ct.fill();
  ct.fillStyle   = '#888';
  ct.font        = 'bold 10px system-ui';
  ct.textAlign   = 'right';
  ct.textBaseline = 'top';
  ct.fillText('SHOTS', GW - 18, 18);
  const dotsToShow = Math.min(L.shots, 6);
  for (let i = 0; i < dotsToShow; i++) {
    const dotX = GW - 108 + i * 18;
    ct.beginPath(); ct.arc(dotX, 44, 6, 0, Math.PI * 2);
    if (i < shotsLeft) {
      ct.fillStyle   = '#ff6b35';
      ct.shadowColor = '#ff6b35';
      ct.shadowBlur  = 10;
    } else {
      ct.fillStyle  = '#222';
      ct.shadowBlur = 0;
    }
    ct.fill();
  }
  ct.shadowBlur = 0;

  // Hint
  if (gs === S.AIM && shots === 0) {
    ct.fillStyle   = 'rgba(255,255,255,0.45)';
    ct.font        = '13px system-ui';
    ct.textAlign   = 'center';
    ct.textBaseline = 'bottom';
    ct.fillText('Drag the ball to aim \u2022 Release to shoot', GW / 2, GH - 22);
  }

  // Combo bar
  if (gs === S.FLY && bounceCount > 0) {
    const cw = 140, ch = 26, cx2 = GW / 2 - cw / 2, cy2 = GH - 44;
    ct.fillStyle   = 'rgba(0,0,0,0.7)';
    roundRect(cx2, cy2, cw, ch, 8); ct.fill();
    ct.strokeStyle = '#a855f7';
    ct.lineWidth   = 1.5;
    ct.shadowColor = '#a855f7';
    ct.shadowBlur  = 8;
    roundRect(cx2, cy2, cw, ch, 8); ct.stroke();
    ct.shadowBlur  = 0;
    ct.fillStyle   = '#d8b4fe';
    ct.font        = 'bold 13px system-ui';
    ct.textAlign   = 'center';
    ct.textBaseline = 'middle';
    ct.fillText(`COMBO x${comboMult.toFixed(1)}`, GW / 2, cy2 + ch / 2);
  }
}

  const cy = GH / 2 - 160;
  ct.fillStyle   = '#0e0e28';
  ct.strokeStyle = '#ffd700';
  ct.lineWidth   = 2;
  ct.shadowColor = '#ffd700';
  ct.shadowBlur  = 30;
  roundRect(35, cy, GW - 70, 320, 18); ct.fill(); ct.stroke();
  ct.shadowBlur = 0;

  ct.fillStyle   = isDailyChallenge ? '#f59e0b' : '#ffd700';
  ct.font        = 'bold 22px system-ui';
  ct.textAlign   = 'center';
  ct.textBaseline = 'middle';
  ct.fillText(isDailyChallenge ? '\u2605 Daily Complete!' : 'Level Clear!', GW / 2, cy + 38);

  // Stars
  for (let i = 0; i < 3; i++) {
    const sx = GW / 2 + (i - 1) * 52;

    ct.textAlign   = 'center';
    ct.textBaseline = 'middle';

  ct.font        = 'bold 30px system-ui';
  ct.textAlign   = 'center';
  ct.textBaseline = 'middle';

  // Combo note
  if (comboMult > 1.05) {

    ct.textAlign   = 'center';

// ── Input ──────────────────────────────────────────────────
function evPos(e) {
  const r = C.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x: (t.clientX - r.left) / SCALE, y: (t.clientY - r.top) / SCALE };
}

function goFullscreen() {
  const el = document.documentElement;
  if (el.requestFullscreen)            el.requestFullscreen().catch(() => {});
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  else if (el.mozRequestFullScreen)    el.mozRequestFullScreen();
}

function onDown(e) {
  e.preventDefault();
  goFullscreen();
  const p = evPos(e); mx = p.x; my = p.y;

  if (gs === S.MENU) {
    // Daily challenge button hit test
    const daily = getDailyInfo();
    if (mx > 50 && mx < GW - 50 && my > 158 && my < 202) {
      if (!daily.done) {
        isDailyChallenge = true;
        lvlIdx = daily.lvl;
        totalScore = 0;
        loadLevel(daily.lvl, true);
      }
      return;
    }
    // Level rows
    for (let i = 0; i < LEVELS.length; i++) {
      const by = 210 + i * 38;
      if (mx > 30 && mx < GW - 30 && my > by && my < by + 34) {
        isDailyChallenge = false;
        lvlIdx = i;
        if (i === 0) totalScore = 0;
        loadLevel(i, false);
        return;
      }
    }
    return;
  }

  // Win card button
  if (gs === S.WIN) {
    const cy = GH / 2 - 160;
    if (my > cy + 220 && my < cy + 272 && mx > GW / 2 - 88 && mx < GW / 2 + 88) {
      if (lvlIdx >= LEVELS.length - 1 || isDailyChallenge) {
        gs = S.MENU; totalScore = 0; isDailyChallenge = false;
      } else {
        loadLevel(++lvlIdx, false);
      }
    }
    return;
  }

  // Fail card button
  if (gs === S.FAIL) {
    const cy = GH / 2 - 130;
    if (my > cy + 175 && my < cy + 227 && mx > GW / 2 - 88 && mx < GW / 2 + 88) {
      totalScore = Math.max(0, totalScore - levelScore);
      loadLevel(lvlIdx, isDailyChallenge);
    }
    return;
  }

  if (gs === S.AIM) {
    const dist = Math.hypot(mx - ballStart.x, my - ballStart.y);
    if (dist < 60) dragging = true;
  }
}

function onMove(e) {
  if (e.cancelable) e.preventDefault();
  const p = evPos(e); mx = p.x; my = p.y;
}

function onUp(e) {
  if (gs === S.AIM && dragging) shoot(mx, my);
  dragging = false;
}

C.addEventListener('mousedown',  onDown);
C.addEventListener('mousemove',  onMove);
C.addEventListener('mouseup',    onUp);
C.addEventListener('touchstart', onDown, { passive: false });
C.addEventListener('touchmove',  onMove, { passive: false });
C.addEventListener('touchend',   onUp);

// ── Game loop ──────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  tickParticles();

  if (gs === S.MENU) { drawMenu(); return; }

  if (gs === S.FLY) {
    updateMovingWalls();
    Engine.update(engine, 1000 / 60);
    updatePortals();

    if (ballBody) {
      const { x, y } = ballBody.position;
      trail.push({ x, y });
      if (trail.length > 38) trail.shift();
      currentRunRecord.push([x, y]);
      if (ghostIdx < ghostFrames.length) ghostIdx++;
    }
    checkStop();
  } else if (gs === S.AIM) {
    updateMovingWalls();
    Engine.update(engine, 1000 / 60);
    updatePortals();
  }

  drawBG();
  drawTrail();
  drawGhost();
  drawWalls();
  drawBumpers();
  drawPortals();
  drawGoal();
  drawBall();
  drawAim();
  drawParticles();
  drawFloatTexts();
  drawHUD();

  if (gs === S.WIN)  { drawWinCard(lvlIdx >= LEVELS.length - 1); }
  if (gs === S.FAIL) { drawFailCard(); }
}

// ── Start ──────────────────────────────────────────────────
gs = S.MENU;
mkEngine();
loop();
</script>
